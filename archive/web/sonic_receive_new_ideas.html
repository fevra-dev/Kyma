<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' blob: https://cdn.jsdelivr.net;">
    <title>SONIC RECEIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #1c1c1e;
            --panel:     #232326;
            --chrome-hi: #4a4a50;
            --chrome-lo: #111113;
            --chrome-md: #2e2e33;
            --green:     #6dbf67;
            --green-dim: #3a7a36;
            --amber:     #c8a84b;
            --text-pri:  #c8c8cc;
            --text-sec:  #6a6a70;
            --text-dim:  #3d3d42;
            --inset-shadow: inset 0 2px 8px rgba(0,0,0,0.7), inset 0 1px 2px rgba(0,0,0,0.9);
            --raise-shadow: 0 2px 6px rgba(0,0,0,0.6), 0 1px 2px rgba(255,255,255,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(ellipse at 50% 0%, rgba(80,80,90,0.08) 0%, transparent 65%);
            color: var(--text-pri);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* ── TITLE ─────────────────────────────────── */
        .title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 300;
            font-size: clamp(0.9rem, 2.5vw, 1.05rem);
            letter-spacing: 0.38em;
            color: var(--text-sec);
            text-transform: uppercase;
            margin-bottom: 2.4rem;
            user-select: none;
        }

        /* ── VU METER ──────────────────────────────── */
        .vu-housing {
            width: min(380px, 88vw);
            background: linear-gradient(180deg, #2a2a2d 0%, #1e1e21 60%, #1a1a1c 100%);
            border-radius: 6px;
            border: 1px solid var(--chrome-hi);
            border-bottom-color: var(--chrome-lo);
            box-shadow:
                0 4px 24px rgba(0,0,0,0.8),
                0 1px 0 rgba(255,255,255,0.05),
                inset 0 1px 0 rgba(255,255,255,0.06);
            padding: 16px 20px 14px;
            margin-bottom: 1.8rem;
        }

        .vu-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            font-size: 0.65rem;
            letter-spacing: 0.28em;
            color: var(--text-sec);
            text-align: center;
            margin-bottom: 10px;
        }

        .vu-face {
            background: radial-gradient(ellipse at 50% 110%, #1a2e1a 0%, #0d1a0d 40%, #0a0f0a 100%);
            border-radius: 4px;
            border: 1px solid #0d0d0f;
            box-shadow: var(--inset-shadow);
            padding: 14px 14px 8px;
            position: relative;
            overflow: hidden;
        }

        .vu-face::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 3px
            );
            pointer-events: none;
        }

        #vu-svg { width: 100%; display: block; }

        /* ── STATUS ROW ───────────────────────────── */
        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
            min-height: 20px;
        }

        #status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
            flex-shrink: 0;
            transition: background 0.3s;
        }
        #status-dot.active {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: dot-pulse 1.6s ease-in-out infinite;
        }
        #status-dot.error  { background: #e05050; box-shadow: 0 0 6px #e05050; }
        #status-dot.amber  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

        @keyframes dot-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        #status-text {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.18em;
            color: var(--text-sec);
            text-transform: uppercase;
        }
        #status-text.active { color: var(--green); }
        #status-text.error  { color: #e05050; }
        #status-text.amber  { color: var(--amber); }

        /* ── OUTPUT DISPLAY ───────────────────────── */
        #output-box {
            width: min(380px, 88vw);
            background: linear-gradient(180deg, #171719 0%, #141416 100%);
            border: 1px solid #2a2a2e;
            border-radius: 4px;
            padding: 14px 18px;
            margin-bottom: 0.7rem;
            box-shadow: var(--inset-shadow);
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: border-color 0.3s;
        }

        #output-box.received {
            border-color: #2e3a2e;
            align-items: flex-start;
        }

        #output-box.error-state { border-color: #3a2020; }

        #output-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            color: var(--text-sec);
            text-transform: uppercase;
            align-self: flex-start;
        }

        #output-value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
            text-align: center;
            word-break: break-all;
            white-space: pre-wrap;
            width: 100%;
            line-height: 1.55;
        }

        #output-box.received #output-value {
            color: var(--text-pri);
            text-align: left;
            font-size: 0.82rem;
        }

        #output-box.error-state #output-value { color: #e05050; text-align: center; }

        /* ── HINT ─────────────────────────────────── */
        .hint {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* ── PASSPHRASE SECTION ───────────────────── */
        #passphraseRow {
            display: none;
            width: min(380px, 88vw);
            flex-direction: column;
            gap: 8px;
            margin-bottom: 1.4rem;
        }
        #passphraseRow.visible {
            display: flex;
            animation: fadeUp 0.3s ease-out;
        }

        .passphrase-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 0.2em;
            color: var(--text-sec);
            text-transform: uppercase;
        }

        #passphraseInput {
            width: 100%;
            padding: 12px 14px;
            background: linear-gradient(180deg, #111113 0%, #141416 100%);
            border: 1px solid #2a2a2e;
            border-radius: 4px;
            box-shadow: var(--inset-shadow);
            color: var(--text-pri);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            outline: none;
            transition: border-color 0.2s;
        }
        #passphraseInput::placeholder { color: var(--text-dim); }
        #passphraseInput:focus { border-color: var(--chrome-hi); }

        .btn-decrypt {
            width: 100%;
            padding: 12px;
            background: linear-gradient(180deg, #3a3a40 0%, #2a2a2e 100%);
            color: var(--text-pri);
            border: 1px solid #3a3a42;
            border-bottom-color: #1a1a1e;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-decrypt:hover { opacity: 0.85; }
        .btn-decrypt:active { transform: translateY(1px); }

        /* ── RAMS TOGGLE ──────────────────────────── */
        .switch-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 0.4rem;
        }

        .toggle-track {
            position: relative;
            width: 72px; height: 36px;
            background: linear-gradient(180deg, #111113 0%, #1a1a1d 100%);
            border-radius: 18px;
            border: 1px solid #111;
            border-top-color: #0a0a0c;
            box-shadow: var(--inset-shadow), 0 0 0 1px rgba(255,255,255,0.04);
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .toggle-knob {
            position: absolute;
            top: 4px; left: 4px;
            width: 26px; height: 26px;
            border-radius: 13px;
            background: linear-gradient(160deg, #4a4a52 0%, #2e2e34 50%, #252528 100%);
            border: 1px solid #111;
            border-top-color: #5a5a62;
            box-shadow:
                0 2px 6px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.08),
                inset 0 -1px 0 rgba(0,0,0,0.4);
            transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .toggle-track.on .toggle-knob { transform: translateX(36px); }

        .toggle-track.on {
            box-shadow:
                var(--inset-shadow),
                0 0 0 1px rgba(109,191,103,0.15),
                0 0 12px rgba(109,191,103,0.06);
        }

        .toggle-knob::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #2a2a2e;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .toggle-track.on .toggle-knob::after {
            background: var(--green);
            box-shadow: 0 0 6px var(--green), inset 0 1px 1px rgba(255,255,255,0.3);
        }

        .switch-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 0.28em;
            color: var(--text-dim);
            text-transform: uppercase;
            user-select: none;
        }

        /* ── ANIMATIONS ───────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes needle-idle {
            0%   { transform: rotate(-52deg); }
            20%  { transform: rotate(-45deg); }
            50%  { transform: rotate(-55deg); }
            75%  { transform: rotate(-48deg); }
            100% { transform: rotate(-52deg); }
        }

        @keyframes needle-active {
            0%   { transform: rotate(-10deg); }
            15%  { transform: rotate(30deg); }
            30%  { transform: rotate(10deg); }
            45%  { transform: rotate(38deg); }
            60%  { transform: rotate(15deg); }
            80%  { transform: rotate(42deg); }
            100% { transform: rotate(-10deg); }
        }

        #vu-needle {
            transform-origin: 50% 100%;
            transform: rotate(-52deg);
            animation: needle-idle 3.5s ease-in-out infinite;
        }
        #vu-needle.active { animation: needle-active 0.9s ease-in-out infinite; }

        /* ── STAR ─────────────────────────────────── */
        .star-mark {
            position: fixed;
            bottom: 20px; right: 22px;
            opacity: 0.18;
            user-select: none;
        }
        .star-mark svg { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <div class="title">SONIC RECEIVE</div>

    <!-- VU METER -->
    <div class="vu-housing">
        <div class="vu-label">LISTEN</div>
        <div class="vu-face">
            <svg id="vu-svg" viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="faceGrad" cx="50%" cy="100%" r="90%">
                        <stop offset="0%" stop-color="#1a2e1a"/>
                        <stop offset="100%" stop-color="#0a0f0a"/>
                    </radialGradient>
                </defs>
                <rect width="340" height="120" fill="url(#faceGrad)" rx="3"/>
                <g id="scale-ticks"></g>
                <g id="scale-labels"></g>
                <line id="vu-needle-shadow"
                    x1="170" y1="130" x2="170" y2="28"
                    stroke="rgba(0,0,0,0.45)" stroke-width="2.5" stroke-linecap="round"
                    style="transform-origin:170px 130px; transform:rotate(-52deg) translate(1px,1px);"
                />
                <g id="vu-needle">
                    <line x1="170" y1="130" x2="170" y2="26"
                        stroke="#c8c8aa" stroke-width="1.6" stroke-linecap="round"/>
                    <line x1="170" y1="26" x2="170" y2="36"
                        stroke="rgba(255,255,200,0.5)" stroke-width="0.8" stroke-linecap="round"/>
                </g>
                <circle cx="170" cy="130" r="5" fill="#1e1e20" stroke="#3a3a3e" stroke-width="1"/>
                <circle cx="170" cy="130" r="2.5" fill="#4a4a52"/>
                <circle cx="170" cy="130" r="1" fill="#6a6a72"/>
            </svg>
        </div>
    </div>

    <!-- STATUS -->
    <div class="status-row">
        <div id="status-dot"></div>
        <div id="status-text">TAP TO LISTEN</div>
    </div>

    <!-- OUTPUT DISPLAY -->
    <div id="output-box">
        <div id="output-label" style="display:none;"></div>
        <div id="output-value" style="color:var(--text-dim);">HOLD DEVICE NEAR SOUND. AUDIBLE.</div>
    </div>

    <div class="hint">SONIC DATA OVER SOUND</div>

    <!-- PASSPHRASE -->
    <div id="passphraseRow">
        <div class="passphrase-label">SESSION CODE</div>
        <input type="text" id="passphraseInput" placeholder="Enter session code" autocomplete="off" spellcheck="false">
        <button class="btn-decrypt" onclick="tryDecrypt()">DECRYPT</button>
    </div>

    <!-- TOGGLE -->
    <div class="switch-block">
        <div class="toggle-track" id="mainToggle" onclick="handleToggle()">
            <div class="toggle-knob"></div>
        </div>
        <div class="switch-label" id="toggleLabel">LISTEN</div>
    </div>

    <div class="star-mark">
        <svg viewBox="0 0 24 24" fill="var(--text-pri)">
            <path d="M12 2 L13.2 10.8 L22 12 L13.2 13.2 L12 22 L10.8 13.2 L2 12 L10.8 10.8 Z"/>
        </svg>
    </div>

    <!-- Draw VU scale -->
    <script>
    (function() {
        const cx = 170, cy = 130, R = 108;
        const marks = [
            { db: -20, label: '-20', color: '#3a5a3a' },
            { db: -10, label: '-10', color: '#3a5a3a' },
            { db: -7,  label: '-7',  color: '#3a5a3a' },
            { db: -5,  label: '-5',  color: '#3a5a3a' },
            { db: -3,  label: '-3',  color: '#4a7a44' },
            { db: -1,  label: '-1',  color: '#5a9654' },
            { db: 0,   label: '0',   color: '#6dbf67' },
            { db: 1,   label: '+1',  color: '#6dbf67' },
            { db: 3,   label: '+3',  color: '#6dbf67' },
        ];

        function dbToAngle(db) {
            return -70 + (db - (-20)) / (3 - (-20)) * (35 - (-70));
        }
        function polar(angleDeg, r) {
            const rad = (angleDeg - 90) * Math.PI / 180;
            return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
        }

        const ticksG = document.getElementById('scale-ticks');
        const labelsG = document.getElementById('scale-labels');

        // Arc line
        const arcPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const sP = polar(dbToAngle(-20), R - 6);
        const eP = polar(dbToAngle(3), R - 6);
        arcPath.setAttribute('d', `M ${sP.x} ${sP.y} A ${R-6} ${R-6} 0 0 1 ${eP.x} ${eP.y}`);
        arcPath.setAttribute('fill', 'none');
        arcPath.setAttribute('stroke', '#1e3a1e');
        arcPath.setAttribute('stroke-width', '0.6');
        ticksG.appendChild(arcPath);

        for (let db = -20; db <= 3; db++) {
            const a = dbToAngle(db);
            const isMajor = marks.find(m => m.db === db);
            const outerR = isMajor ? R - 6 : R - 10;
            const innerR = R - 18;
            const p1 = polar(a, outerR), p2 = polar(a, innerR);
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', p1.x); line.setAttribute('y1', p1.y);
            line.setAttribute('x2', p2.x); line.setAttribute('y2', p2.y);
            line.setAttribute('stroke', db >= 0 ? '#6dbf67' : db >= -3 ? '#4a7a44' : '#2a4a2a');
            line.setAttribute('stroke-width', isMajor ? '1.4' : '0.8');
            line.setAttribute('stroke-linecap', 'round');
            ticksG.appendChild(line);
        }

        marks.forEach(m => {
            const lp = polar(dbToAngle(m.db), R - 28);
            const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            t.setAttribute('x', lp.x); t.setAttribute('y', lp.y + 4);
            t.setAttribute('text-anchor', 'middle');
            t.setAttribute('font-family', 'Rajdhani, sans-serif');
            t.setAttribute('font-size', '8'); t.setAttribute('font-weight', '500');
            t.setAttribute('fill', m.color); t.setAttribute('letter-spacing', '0.02em');
            t.textContent = m.label;
            labelsG.appendChild(t);
        });
    })();
    </script>

    <script src="reed_solomon.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ggwave@0.4.0/ggwave.js"></script>
    <script>
        let isListening = false;
        let audioContext, ggwaveInstance;
        let mediaStream = null;
        let pendingEncrypted = null;

        const MAGIC_SVDD = new Uint8Array([0x53, 0x56, 0x44, 0x44]);

        function isSvddPacket(data) {
            if (data.length < 4) return false;
            return data[0] === 0x53 && data[1] === 0x56 && data[2] === 0x44 && data[3] === 0x44;
        }

        /* ── UI helpers ─────────────────────────── */
        function setStatus(text, mode) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            txt.textContent = text;
            dot.className = { active: 'active', error: 'error', amber: 'amber' }[mode] || '';
            txt.className  = { active: 'active', error: 'error', amber: 'amber' }[mode] || '';
        }

        function setOutput(label, value, state /* 'idle'|'received'|'error' */) {
            const box = document.getElementById('output-box');
            const lEl = document.getElementById('output-label');
            const vEl = document.getElementById('output-value');

            box.className = state === 'received' ? 'received' : state === 'error' ? 'error-state' : '';

            if (label) { lEl.style.display = ''; lEl.textContent = label; }
            else { lEl.style.display = 'none'; }

            vEl.textContent = value || '';
            if (state === 'idle')     vEl.style.color = 'var(--text-dim)';
            else if (state === 'error') vEl.style.color = '#e05050';
            else                       vEl.style.color = 'var(--text-pri)';
        }

        function setNeedle(active) {
            document.getElementById('vu-needle').classList.toggle('active', active);
        }

        function setToggle(on) {
            document.getElementById('mainToggle').classList.toggle('on', on);
            document.getElementById('toggleLabel').textContent = on ? 'STOP' : 'LISTEN';
        }

        function handleToggle() {
            if (isListening) {
                stopListening();
                resetUI();
            } else {
                startListening();
            }
        }

        function resetUI() {
            pendingEncrypted = null;
            setStatus('TAP TO LISTEN', 'idle');
            setNeedle(false);
            setToggle(false);
            setOutput(null, 'HOLD DEVICE NEAR SOUND. AUDIBLE.', 'idle');
            document.getElementById('passphraseRow').classList.remove('visible');
            document.getElementById('passphraseInput').value = '';
        }

        /* ── Crypto ─────────────────────────────── */
        async function decryptWithPassphrase(encrypted, passphrase) {
            const enc = new TextEncoder().encode(passphrase);
            const hash = await crypto.subtle.digest('SHA-256', enc);
            const key = await crypto.subtle.importKey('raw', hash, { name: 'AES-GCM' }, false, ['decrypt']);
            const iv = encrypted.slice(4, 16);
            const ciphertext = encrypted.slice(16);
            const decrypted = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv, tagLength: 128 }, key, ciphertext
            );
            return new Uint8Array(decrypted);
        }

        async function tryDecrypt() {
            const input = document.getElementById('passphraseInput');
            if (!pendingEncrypted || !input.value.trim()) return;
            try {
                const plain = await decryptWithPassphrase(pendingEncrypted, input.value.trim());
                const text = new TextDecoder('utf-8', { fatal: false }).decode(plain);
                setOutput('DECRYPTED', text, 'received');
                setStatus('DECRYPTED', 'active');
                document.getElementById('passphraseRow').classList.remove('visible');
                pendingEncrypted = null;
            } catch (e) {
                setOutput('ERROR', 'Wrong session code.', 'error');
                setStatus('WRONG CODE', 'error');
            }
        }

        /* ── Audio ──────────────────────────────── */
        function stopListening() {
            if (!isListening) return;
            isListening = false;
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) audioContext.close();
        }

        async function startListening() {
            if (isListening) return;
            try {
                if (typeof ggwave_factory !== 'function')
                    throw new Error('ggwave failed to load — use HTTP server, not file://');

                const ggwave = await ggwave_factory();
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, autoGainControl: false, noiseSuppression: false }
                });

                audioContext = new AudioContext();
                const captureRate = audioContext.sampleRate;
                console.log('[SonicReceive] Capture rate:', captureRate);

                const TARGET_RATE = 48000;
                const parameters = ggwave.getDefaultParameters();
                parameters.sampleRateInp = TARGET_RATE;
                parameters.sampleRateOut = TARGET_RATE;
                ggwaveInstance = ggwave.init(parameters);

                const source = audioContext.createMediaStreamSource(mediaStream);

                function resampleTo48k(samples, fromRate) {
                    if (fromRate === TARGET_RATE) return samples;
                    if (fromRate === 96000) {
                        const out = new Float32Array(samples.length >>> 1);
                        for (let i = 0; i < out.length; i++) out[i] = samples[i << 1];
                        return out;
                    }
                    if (fromRate === 44100) {
                        const outLen = Math.floor(samples.length * TARGET_RATE / fromRate);
                        const out = new Float32Array(outLen);
                        for (let i = 0; i < outLen; i++) {
                            const srcIdx = i * fromRate / TARGET_RATE;
                            const i0 = Math.floor(srcIdx);
                            const i1 = Math.min(i0 + 1, samples.length - 1);
                            const f = srcIdx - i0;
                            out[i] = samples[i0] * (1 - f) + samples[i1] * f;
                        }
                        return out;
                    }
                    return samples;
                }

                function float32ToInt16Pcm(float32Array) {
                    const int16 = new Int16Array(float32Array.length);
                    for (let i = 0; i < float32Array.length; i++) {
                        const s = Math.max(-1, Math.min(1, float32Array[i]));
                        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    return new Int8Array(int16.buffer);
                }

                const workletCode = `
                    class SonicReceiveProcessor extends AudioWorkletProcessor {
                        process(inputs) {
                            const input = inputs[0]?.[0];
                            if (input?.length > 0) this.port.postMessage({ samples: new Float32Array(input) });
                            return true;
                        }
                    }
                    registerProcessor('sonic-receive-processor', SonicReceiveProcessor);
                `;
                const workletBlob = new Blob([workletCode], { type: 'application/javascript' });
                const workletUrl = URL.createObjectURL(workletBlob);
                await audioContext.audioWorklet.addModule(workletUrl);
                URL.revokeObjectURL(workletUrl);

                let decodeCount = 0;
                const processor = new AudioWorkletNode(audioContext, 'sonic-receive-processor', {
                    numberOfInputs: 1, numberOfOutputs: 1, outputChannelCount: [1]
                });

                processor.port.onmessage = function(e) {
                    const { samples } = e.data;
                    if (!samples?.length) return;
                    const resampled = resampleTo48k(samples, captureRate);
                    const pcm = float32ToInt16Pcm(resampled);
                    const result = ggwave.decode(ggwaveInstance, pcm);
                    decodeCount++;
                    if (decodeCount % 100 === 0)
                        console.log('[SonicReceive] decode #' + decodeCount + ': result=' + (result?.length ?? 'null'));

                    if (result && result.length > 0) {
                        console.log('[SonicReceive] decode OK: length=' + result.length);
                        const bytes = new Uint8Array(result);
                        const text = new TextDecoder('utf-8', { fatal: false }).decode(bytes);
                        const isReadable = /^[\x20-\x7E\r\n\t]*$/.test(text) && text.length > 0 && !/\uFFFD/.test(text);

                        stopListening();
                        setNeedle(false);
                        setToggle(false);

                        if (isReadable) {
                            setOutput('RECEIVED', text, 'received');
                            setStatus('RECEIVED', 'active');
                            return;
                        }

                        const rsDecoded = ReedSolomonDecoder.decode(bytes);
                        if (rsDecoded) {
                            if (isSvddPacket(rsDecoded)) {
                                pendingEncrypted = rsDecoded;
                                setOutput('ENCRYPTED', 'Enter session code to decrypt.', 'received');
                                setStatus('SESSION CODE REQUIRED', 'amber');
                                document.getElementById('passphraseRow').classList.add('visible');
                                document.getElementById('passphraseInput').focus();
                            } else {
                                setOutput('ENCRYPTED', 'ECDH encrypted — use SonicVault app.', 'received');
                                setStatus('APP-ONLY', 'amber');
                            }
                        } else {
                            const hex = Array.from(bytes.slice(0, 48))
                                .map(b => b.toString(16).padStart(2, '0')).join(' ')
                                + (bytes.length > 48 ? ' …' : '');
                            setOutput(bytes.length + ' BYTES', hex, 'received');
                            setStatus('RECEIVED', 'active');
                        }
                    }
                };

                source.connect(processor);
                processor.connect(audioContext.destination);

                isListening = true;
                setStatus('LISTENING...', 'active');
                setToggle(true);
                setNeedle(true);
                setOutput(null, 'HOLD DEVICE NEAR SOUND. AUDIBLE.', 'idle');

            } catch (err) {
                setStatus('ERROR: ' + err.message.toUpperCase(), 'error');
                setNeedle(false);
                setToggle(false);
            }
        }
    </script>
</body>
